name: Deploy to Hugging Face Spaces

on:
  push:
    branches: [main]
    paths:
      - 'api/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Push api/ to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "deploy@github.com"
          git config --global user.name "GitHub Actions"

          # Clone the HF Space
          git clone https://josephjang2:$HF_TOKEN@huggingface.co/spaces/josephjang2/wordbook-api hf-space

          # Sync api/ contents to the Space
          rsync -av --delete \
            --exclude='.git' \
            --exclude='.venv' \
            --exclude='__pycache__' \
            api/ hf-space/

          # Push to HF Space
          cd hf-space
          git add .
          git diff --staged --quiet || git commit -m "Deploy from GitHub ${{ github.sha }}"
          git push
